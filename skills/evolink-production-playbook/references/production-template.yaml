project:
  name: brand_marketing_video_variable_duration
  version: v1
  objective: "按用户要求时长的品牌营销视频"
  priority: speed-first   # speed-first | quality-first | cost-first
  outputs:
    - video_main_user_duration_16x9_1080p
    - video_cutdown_optional_16x9_1080p
    - poster_keyframe
    - bgm_user_duration
  brand:
    name: "【品牌名】"
    must_show_times: 2
    tone: ["科技感", "可信", "高效"]

global_constraints:
  aspect_ratio: "16:9"
  quality: "1080p"
  fps: 25
  language: "zh-CN"
  subtitle_required: true

model_presets:
  default_last_verified:
    description: "默认高质量执行（上次验证可用）"
    image: "doubao-seedream-4.5"
    video: "doubao-seedance-1.0-pro-fast"
    music: "suno-v4.5"
  low_cost_test:
    description: "低成本流程压测"
    image: "z-image-turbo"
    video: "doubao-seedance-1.0-pro-fast"
    music: "suno-v4"

model_registry:
  image:
    primary: "doubao-seedream-4.5"
    fallback: ["gpt-image-1.5", "gemini-3.1-flash-image-preview"]
  video:
    primary: "doubao-seedance-1.0-pro-fast"
    fallback: ["seedance-1.5-pro", "kling-o3-text-to-video"]
  music:
    primary: "suno-v4.5"
    fallback: ["suno-v5", "suno-v4"]

pipeline:
  - step: script_storyboard
    owner: writer
    output: ["voiceover_80_110_words", "storyboard_6_8_shots", "slogan_3_options"]
    acceptance: ["hook_within_3s", "value_clear_within_10s", "brand_mention>=2"]

  - step: visual_anchor
    owner: vfx
    model: "image.primary"
    output: ["keyframe_pack(3-6)", "styleboard", "hud_template_notes"]

  - step: video_generation_segmented
    owner: director
    model: "video.primary"
    segmentation:
      target_duration_sec: "from_user_requirement"
      segment_plan_source: "writer_director_negotiated"
      rhythm_required: true
      segments:
        - { id: s01, range: "example:0-4", goal: "hook" }
        - { id: s02, range: "example:4-9", goal: "core_value" }
        - { id: s03, range: "example:9-15", goal: "workflow" }
        - { id: s04, range: "example:15-22", goal: "proof_trust" }
        - { id: s05, range: "example:22-end", goal: "logo_lock" }
      overlap_sec: 0.4
      continuity_anchor: ["same_main_subject", "same_color_palette", "same_hud_motif"]
    failure_policy:
      retry_per_segment: 2
      on_fail: ["switch_to_video_fallback_next", "reduce_quality_one_level", "keep_other_segments_unchanged"]

  - step: music_generation
    owner: editor
    model: "music.primary"
    params:
      custom_mode: false
      instrumental: true
      duration_sec: "from_user_requirement"

  - step: edit_and_compose
    owner: editor
    timeline_rules:
      beat_points: "from_writer_director_segment_plan"
      subtitle_min_hold_sec: 1.2
    export:
      master:
        codec: "H.264"
        resolution: "1920x1080"
        bitrate_mbps: "10-16"
        audio: "AAC 320kbps 48kHz"

collaboration_protocol:
  trigger_rule: "被@或任务卡触发必须文字回复，禁止NO_REPLY"
  handoff_format: "<@1479001609127067720> 已交付｜角色：X｜任务：X｜版本：vX｜请验收"
  gate_rule: "未获验收通过，不进入下一棒"
