project:
  name: brand_promo_30s
  version: v1
  objective: "30秒科技感品牌曝光"
  priority: speed-first   # speed-first | quality-first | cost-first
  outputs:
    - video_30s_16x9_1080p
    - video_15s_16x9_1080p
    - poster_keyframe
    - bgm_30s
  brand:
    name: "【品牌名】"
    must_show_times: 2
    tone: ["科技感", "可信", "高效"]

global_constraints:
  aspect_ratio: "16:9"
  quality: "1080p"
  fps: 25
  language: "zh-CN"
  subtitle_required: true

model_registry:
  image:
    primary: "doubao-seedream-4.5"
    fallback: ["gpt-image-1.5", "gemini-3.1-flash-image-preview"]
  video:
    primary: "doubao-seedance-1.0-pro-fast"
    fallback: ["seedance-1.5-pro", "kling-o3-text-to-video"]
  music:
    primary: "suno-v4.5"
    fallback: ["suno-v5", "suno-v4"]

pipeline:
  - step: script_storyboard
    owner: writer
    output: ["voiceover_80_110_words", "storyboard_6_8_shots", "slogan_3_options"]
    acceptance: ["hook_within_3s", "value_clear_within_10s", "brand_mention>=2"]

  - step: visual_anchor
    owner: vfx
    model: "image.primary"
    output: ["keyframe_pack(3-6)", "styleboard", "hud_template_notes"]

  - step: video_generation_segmented
    owner: director
    model: "video.primary"
    segmentation:
      target_duration_sec: 30
      segments:
        - { id: s01, range: "0-5", goal: "hook" }
        - { id: s02, range: "5-10", goal: "core_value" }
        - { id: s03, range: "10-15", goal: "workflow" }
        - { id: s04, range: "15-20", goal: "control_trust" }
        - { id: s05, range: "20-25", goal: "industry_montage" }
        - { id: s06, range: "25-30", goal: "logo_lock" }
      overlap_sec: 0.4
      continuity_anchor: ["same_main_subject", "same_color_palette", "same_hud_motif"]
    failure_policy:
      retry_per_segment: 2
      on_fail: ["switch_to_video_fallback_next", "reduce_quality_one_level", "keep_other_segments_unchanged"]

  - step: music_generation
    owner: editor
    model: "music.primary"
    params:
      custom_mode: false
      instrumental: true
      duration_sec: 30

  - step: edit_and_compose
    owner: editor
    timeline_rules:
      beat_points: ["0.0","3.0","7.0","10.0","14.0","19.0","24.0","28.5","30.0"]
      subtitle_min_hold_sec: 1.2
    export:
      master:
        codec: "H.264"
        resolution: "1920x1080"
        bitrate_mbps: "10-16"
        audio: "AAC 320kbps 48kHz"

collaboration_protocol:
  trigger_rule: "被@或任务卡触发必须文字回复，禁止NO_REPLY"
  handoff_format: "<@1479001609127067720> 已交付｜角色：X｜任务：X｜版本：vX｜请验收"
  gate_rule: "未获验收通过，不进入下一棒"
